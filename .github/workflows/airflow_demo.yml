name: Airflow Demo Mode

on:
  workflow_dispatch:
    inputs:
      hours:
        description: 'How many hours to run the Airflow server?'
        required: true
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'

jobs:
  demo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Start Airflow Server
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=boohoo-airflow" "Name=instance-state-name,Values=stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Instance not found or already running!"
            INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=boohoo-airflow" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text)
          else
            aws ec2 start-instances --instance-ids $INSTANCE_ID
            echo "Starting instance $INSTANCE_ID..."
            aws ec2 wait instance-running --instance-ids $INSTANCE_ID
          fi

          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_ID \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)

          echo "=========================================="
          echo "  AIRFLOW IS LIVE!"
          echo "  URL:      http://$PUBLIC_IP:8080"
          echo "  Username: admin"
          echo "  Password: mYGnUG7JuiCwtaH9uX6HQq93"
          echo "  Runtime:  ${{ github.event.inputs.hours }} hour(s)"
          echo "=========================================="
          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Wait for demo duration
        run: |
          SECONDS=$(( ${{ github.event.inputs.hours }} * 3600 ))
          echo "Server will auto-stop in ${{ github.event.inputs.hours }} hour(s)..."
          sleep $SECONDS

      - name: Stop Airflow Server
        if: always()
        run: |
          echo "Stopping instance $INSTANCE_ID..."
          aws ec2 stop-instances --instance-ids $INSTANCE_ID
          echo "Instance stopped. Demo complete."

name: Deploy Boohoo Lambdas (Terraform)

on:
  push:
    branches:
      - main
    paths:
      - 'boohoo/lambda/**'
      - 'boohoo/terraform/**'
      - 'boohoo/scripts/build_zips.py'
      - 'airflow/dags/**'
      - 'boohoo/dbt/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build Lambda Deployment Packages
        working-directory: ./boohoo
        run: python scripts/build_zips.py

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Terraform Init
        working-directory: ./boohoo/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: ./boohoo/terraform
        run: terraform apply -auto-approve

      - name: Sync Airflow DAGs to EC2 via SSM
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=boohoo-airflow" "Name=instance-state-name,Values=running" --query "Reservations[0].Instances[0].InstanceId" --output text)
          if [ "$INSTANCE_ID" != "None" ]; then
            echo "Syncing code to instance: $INSTANCE_ID"
            aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["sudo /usr/local/bin/sync-dags.sh"]' \
              --comment "Sync latest DAGs from GitHub to Airflow EC2"
          else
            echo "Instance is not running, skipping sync."
          fi

name: "PR Title Checker"

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Title format (DATA-X_summary)
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$TITLE" =~ ^DATA-[0-9]+.*$ ]]; then
            echo "❌ Error: Pull Request title must start with 'DATA-<number>'"
            echo "   Examples: 'DATA-10: Add cron based orchestration', 'DATA-11 - SSM Sync'"
            exit 1
          fi
          echo "✅ PR Title matches the required format."

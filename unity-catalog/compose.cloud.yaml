# ═══════════════════════════════════════════════════════════════
# BellosData Cloud — Unity Catalog OSS
# Runs on Lightsail medium alongside Airflow
# ═══════════════════════════════════════════════════════════════

services:
  server:
    image: unitycatalog/unitycatalog:main
    container_name: uc-server
    ports:
      - "8070:8080"
    volumes:
      - uc-data:/opt/unitycatalog/etc/db
      - ./etc/conf/server.properties:/opt/unitycatalog/etc/conf/server.properties:ro
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-2}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/2.1/unity-catalog/catalogs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  ui:
    image: unitycatalog/unitycatalog-ui:main
    container_name: uc-ui
    ports:
      - "3000:3000"
    environment:
      UC_API_URL: "http://server:8080"
    depends_on:
      server:
        condition: service_healthy
    restart: always

volumes:
  uc-data:

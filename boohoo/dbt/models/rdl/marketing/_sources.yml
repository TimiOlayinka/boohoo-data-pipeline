version: 2

sources:
  - name: rdl_marketing
    schema: rdl_marketing
    description: "Marketing channel data across all Boohoo Group brands — raw history tables loaded via COPY from S3"
    tables:
      - name: meta_ads_history
        description: "Meta Ads (Facebook/Instagram) campaign insights — daily campaign × platform granularity"
      - name: google_ads_history
        description: "Google Ads campaign performance — daily ad × device granularity"
      - name: tiktok_ads_history
        description: "TikTok Ads campaign insights — daily ad-level granularity"
      - name: ga4_sessions_history
        description: "Google Analytics 4 web sessions — per-session traffic source and conversion data"
      - name: email_campaigns_history
        description: "Email/CRM campaign performance — per-send aggregated metrics"
      - name: influencer_posts_history
        description: "Influencer marketing — per-post creator performance and engagement data"

duplicate_tests:
- name: no_duplicate_session_id
  description: Each (session_id, brand, ingest_date) combination should be unique
  enabled: true
  schedule: daily
  field:
  - session_id
  - brand
  - ingest_date
  severity: error
gap_tests:
- name: no_missing_date_nk
  description: No gaps in date_nk coverage
  enabled: true
  schedule: daily
  field:
  - date_nk
  severity: warning

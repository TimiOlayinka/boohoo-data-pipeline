duplicate_tests:
- name: no_duplicate_brand
  description: Each (brand, channel) should be unique after dedup
  enabled: true
  schedule: daily
  field:
  - brand
  - channel
  severity: error
gap_tests:
- name: no_missing_date_nk
  description: No gaps in date_nk coverage
  enabled: true
  schedule: daily
  field:
  - date_nk
  severity: warning

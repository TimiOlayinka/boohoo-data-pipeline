duplicate_tests:
- name: unique_product_sk
  description: Surrogate key product_sk must be unique
  enabled: true
  schedule: daily
  field:
  - product_sk
  severity: error
gap_tests:
- name: no_missing_ingest_date
  description: No gaps in ingest_date coverage
  enabled: true
  schedule: daily
  field:
  - ingest_date
  severity: warning

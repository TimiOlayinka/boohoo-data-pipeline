duplicate_tests:
- name: no_duplicate_campaign_nk
  description: Each (campaign_nk, platform, brand) should be unique after dedup
  enabled: true
  schedule: daily
  field:
  - campaign_nk
  - platform
  - brand
  severity: error
- name: unique_campaign_sk
  description: Surrogate key campaign_sk must be unique
  enabled: true
  schedule: daily
  field:
  - campaign_sk
  severity: error
gap_tests: []

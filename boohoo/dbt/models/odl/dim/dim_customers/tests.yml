duplicate_tests:
- name: no_duplicate_email
  description: Each (email) should be unique after dedup
  enabled: true
  schedule: daily
  field:
  - email
  severity: error
- name: unique_customer_sk
  description: Surrogate key customer_sk must be unique
  enabled: true
  schedule: daily
  field:
  - customer_sk
  severity: error
gap_tests:
- name: no_missing_ingest_date
  description: No gaps in ingest_date coverage
  enabled: true
  schedule: daily
  field:
  - ingest_date
  severity: warning

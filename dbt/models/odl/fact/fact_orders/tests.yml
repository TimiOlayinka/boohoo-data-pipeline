duplicate_tests:
- name: unique_order_sk
  description: Surrogate key order_sk must be unique
  enabled: true
  schedule: daily
  field:
  - order_sk
  severity: error
- name: unique_customer_sk
  description: Surrogate key customer_sk must be unique
  enabled: true
  schedule: daily
  field:
  - customer_sk
  severity: error
gap_tests:
- name: no_missing_order_date
  description: No gaps in order_date coverage
  enabled: true
  schedule: daily
  field:
  - order_date
  severity: warning

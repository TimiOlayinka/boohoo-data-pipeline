duplicate_tests:
  - name: unique_date_day
    description: Each date should appear exactly once
    enabled: true
    schedule: daily
    field: [date_day]
    severity: error

gap_tests:
  - name: no_missing_dates
    description: No gaps in the date spine (consecutive days)
    enabled: true
    schedule: daily
    field: [date_day]
    severity: error
  - name: covers_three_years
    description: Date spine should cover at least 1096 days (3 years)
    enabled: true
    schedule: weekly
    field: [date_day]
    severity: warning

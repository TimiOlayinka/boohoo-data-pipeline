duplicate_tests:
- name: no_duplicate_product_id
  description: Each (product_id, ingest_date) combination should be unique
  enabled: true
  schedule: daily
  field:
  - product_id
  - ingest_date
  severity: error
gap_tests:
- name: no_missing_ingest_date
  description: No gaps in ingest_date coverage
  enabled: true
  schedule: daily
  field:
  - ingest_date
  severity: warning
